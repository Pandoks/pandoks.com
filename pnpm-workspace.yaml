packages:
  - apps/*
  - packages/*
  - packages/react-native/*

engineStrict: true
nodeLinker: hoisted # needed for electron
publicHoistPattern:
  - electron
enablePrePostScripts: false # supply-chain: block pre/post lifecycle scripts on `pnpm <script>`

# supply-chain: dependency build-script allowlist (enablePrePostScript exceptions)
allowBuilds:
  esbuild: true
  electron: true
  electron-winstaller: true
  sharp: true
  fs-xattr: true # @electron-forge/maker-dmg (packaging)
  macos-alias: true # @electron-forge/maker-dmg (packaging)
  msgpackr-extract: false
  unrs-resolver: false # eslint-import-resolver-typescript; prebuilt @unrs/resolver-binding-* loads without the script

# TODO: remove override when upstream bumps its pinned dep (fix CVEs)
overrides:
  '@xmldom/xmldom': ^0.9.10 # @electron-forge/cli → plist@^0.8.x
  picomatch: ^4.0.4 # @electron-forge/cli + vite-plugin-static-copy → anymatch@^2.x
  tar: ^7.5.13 # @electron-forge/cli → @electron/node-gyp@^6.x
  cookie: ~1.1.0 # @sveltejs/kit@^0.6.x
  tmp: ^0.2.5 # @electron-forge/cli → external-editor@^0.0.33
  '@electron/node-gyp': ^10.2.0-electron.2 # @electron-forge/cli → @electron/rebuild@3.7
