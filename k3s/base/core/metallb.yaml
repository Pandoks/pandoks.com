apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
    # MetalLB owns 10.0.5.x; cluster nodes use the separate 10.0.1.x-10.0.4.x blocks.
    - 10.0.5.1-10.0.5.254

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default-l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - default-pool
