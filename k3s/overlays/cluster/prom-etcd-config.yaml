# Default production topology: one Public Cloud control plane at 10.0.1.10.
# Before deploying any other topology, replace this explicit inventory with the
# exact active control-plane private IPs as documented in the cluster runbook.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: kube-prometheus-stack
  namespace: kube-system
spec:
  valuesContent: |-
    kubeEtcd:
      enabled: true
      endpoints:
        - 10.0.1.10
      service:
        enabled: true
        port: 2381
        targetPort: 2381
