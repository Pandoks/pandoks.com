# The default topology has no control planes. Before deployment, replace this
# inventory with the exact active control-plane private IPs in the cluster runbook.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: kube-prometheus-stack
  namespace: kube-system
spec:
  valuesContent: |-
    kubeEtcd:
      enabled: true
      endpoints: []
      service:
        enabled: true
        port: 2381
        targetPort: 2381
