# OVH control plane nodes on private network 10.0.1.0/24
# Public Cloud control planes start at .10; dedicated control planes start at .30
# (infra/cluster/cluster.ts). Keep endpoints in sync with the active control planes.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: kube-prometheus-stack
  namespace: kube-system
spec:
  valuesContent: |-
    kubeEtcd:
      enabled: true
      endpoints:
        - 10.0.1.10
        - 10.0.1.11  # uncomment when adding control-plane-1
        - 10.0.1.12  # uncomment when adding control-plane-2
      service:
        enabled: true
        port: 2381
        targetPort: 2381
