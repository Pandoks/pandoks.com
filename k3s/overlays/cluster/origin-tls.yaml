apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-dns-api-token
  namespace: cert-manager
type: Opaque
stringData:
  api-token: ${CloudflareApiKey | quote}

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-production-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-dns-api-token
              key: api-token

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cloudflare-origin-tls
  namespace: example
spec:
  secretName: cloudflare-origin-tls
  dnsNames:
    - ${ExampleDomain}
  privateKey:
    rotationPolicy: Always
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
    group: cert-manager.io
