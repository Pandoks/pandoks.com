apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system

---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: &name metallb
  namespace: &namespace metallb-system
spec:
  repo: https://metallb.github.io/metallb
  chart: *name
  # renovate: datasource=helm depName=metallb registryUrl=https://metallb.github.io/metallb
  version: 0.16.1
  targetNamespace: *namespace
  createNamespace: true
  valuesContent: |-
    speaker:
      frr:
        enabled: false
    frrk8s:
      enabled: false
