[tools]
pnpm = "11.5.1"
node = "24.16.0"
go = "1.26.5"
java = "zulu-17.66.19.0"
uv = "0.11.19"
python = "3.14.6"

aws-cli = "2.35.2"
gcloud = "576.0.0"
helm = "4.2.0"
kubectl = "1.36.1"
k3d = "5.9.0"
kubeconform = "0.8.0"
atlas = "1.2.0"

shellcheck = "0.11.0"
shfmt = "3.13.1"
hadolint = "2.14.0"
actionlint = "1.7.12"
golangci-lint = "2.12.2"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.3.0"
ktlint = "1.8.0"
swiftlint = "0.63.3"
jq = "1.8.1"
ruby = "3.4.9"
cocoapods = "1.16.2"

[settings]
python.uv_venv_auto = true # auto-activate uv-created .venvs (uv.lock projects)
ruby.compile = false # precompiled ruby — no toolchain build

[env]
# uv resolves interpreters from PATH (mise's python) instead of downloading its own
UV_PYTHON_PREFERENCE = "system"
