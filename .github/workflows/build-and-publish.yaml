name: Build and Publish

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      patroni:
        description: 'Image · patroni'
        type: boolean
        default: false
      pgbackrest:
        description: 'Image · pgbackrest'
        type: boolean
        default: false
      valkey:
        description: 'Image · valkey'
        type: boolean
        default: false
      valkey-reconciler:
        description: 'Image · valkey-reconciler'
        type: boolean
        default: false
      argocd-sst-plugin:
        description: 'Image · argocd-sst-plugin'
        type: boolean
        default: false
      clickhouse:
        description: 'Image · clickhouse'
        type: boolean
        default: false
      clickhouse-keeper:
        description: 'Image · clickhouse-keeper'
        type: boolean
        default: false
      clickhouse-backup:
        description: 'Image · clickhouse-backup'
        type: boolean
        default: false
      postgres-chart:
        description: 'Chart · postgres'
        type: boolean
        default: false
      valkey-chart:
        description: 'Chart · valkey'
        type: boolean
        default: false
      clickhouse-chart:
        description: 'Chart · clickhouse'
        type: boolean
        default: false
  push:
    branches:
      - '**'

concurrency:
  group: build-and-publish-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-image-matrix.outputs.images }}
      charts: ${{ steps.set-chart-matrix.outputs.charts }}

    steps:
      - uses: actions/checkout@v6

      - id: image-changes
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            patroni:
              - 'packages/postgres/patroni/**'
            pgbackrest:
              - 'packages/postgres/pgbackrest/**'
            valkey:
              - 'packages/valkey/**'
            valkey-reconciler:
              - 'packages/valkey/reconciler/**'
            argocd-sst-plugin:
              - 'packages/argocd/**'
            clickhouse:
              - 'packages/clickhouse/clickhouse/**'
            clickhouse-keeper:
              - 'packages/clickhouse/keeper/**'
            clickhouse-backup:
              - 'packages/clickhouse/backup/**'

      - id: chart-changes
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            postgres:
              - 'packages/postgres/chart/**'
            valkey:
              - 'packages/valkey/chart/**'
            clickhouse:
              - 'packages/clickhouse/chart/**'

      - id: set-image-matrix
        env:
          CHANGES: ${{ steps.image-changes.outputs.changes }}
          DISPATCH: ${{ toJSON(inputs) }}
        run: |
          all='[
            {"name":"patroni","path":"./packages/postgres/patroni/Dockerfile"},
            {"name":"pgbackrest","path":"./packages/postgres/pgbackrest/Dockerfile"},
            {"name":"valkey","path":"./packages/valkey/Dockerfile"},
            {"name":"valkey-reconciler","path":"./packages/valkey/reconciler/Dockerfile"},
            {"name":"argocd-sst-plugin","path":"./packages/argocd/Dockerfile"},
            {"name":"clickhouse","path":"./packages/clickhouse/clickhouse/Dockerfile"},
            {"name":"clickhouse-keeper","path":"./packages/clickhouse/keeper/Dockerfile"},
            {"name":"clickhouse-backup","path":"./packages/clickhouse/backup/Dockerfile"}
          ]'
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            selected=$(jq -c 'to_entries | map(select(.value == true) | .key)' <<<"${DISPATCH}")
          else
            selected="${CHANGES:-[]}"
          fi
          images=$(jq -c --argjson sel "${selected}" 'map(select(.name as $n | $sel | index($n)))' <<<"${all}")
          echo "images=${images}" >> "${GITHUB_OUTPUT}"

      - id: set-chart-matrix
        env:
          CHANGES: ${{ steps.chart-changes.outputs.changes }}
          DISPATCH: ${{ toJSON(inputs) }}
        run: |
          all='[
            {"name":"postgres","path":"./packages/postgres/chart"},
            {"name":"valkey","path":"./packages/valkey/chart"},
            {"name":"clickhouse","path":"./packages/clickhouse/chart"}
          ]'
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # chart inputs are *-chart; strip suffix before matching
            selected=$(jq -c 'to_entries | map(select(.value == true and (.key | endswith("-chart"))) | .key | sub("-chart$"; ""))' <<<"${DISPATCH}")
          else
            selected="${CHANGES:-[]}"
          fi
          charts=$(jq -c --argjson sel "${selected}" 'map(select(.name as $n | $sel | index($n)))' <<<"${all}")
          echo "charts=${charts}" >> "${GITHUB_OUTPUT}"

  build-publish-images:
    needs: detect-changes
    if: needs.detect-changes.outputs.images != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        image: ${{ fromJSON(needs.detect-changes.outputs.images) }}

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          # NOTE: github.repository includes the owner/org (ghcr.io/<owner/org>/repo-name)
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: . # WARN: all dockerfiles should have a context of the root of the repo
          file: ${{ matrix.image.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Generate Attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: false

  publish-charts:
    needs: detect-changes
    if: needs.detect-changes.outputs.charts != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        chart: ${{ fromJSON(needs.detect-changes.outputs.charts) }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'latest'

      - name: Login to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and Push Helm Chart
        run: |
          helm package ${{ matrix.chart.path }}
          LOWERCASE_REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push ${{ matrix.chart.name }}-*.tgz "oci://ghcr.io/${LOWERCASE_REPO_OWNER}/charts"
