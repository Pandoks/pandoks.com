name: Branch deletion cleanup
on:
  delete:

permissions: {}

jobs:
  cleanup-cloudflare-previews:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Cloudflare Pages previews for deleted branch
        shell: bash
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BRANCH: ${{ github.event.ref }} # WARNING: do not inline this (security risk)
        run: |
          api="https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}/pages/projects/pandoks/deployments"
          ids=()
          page=1
          while :; do
            response=$(curl -fsS -H "Authorization: Bearer ${TOKEN}" "${api}?per_page=25&page=${page}")
            matches=$(printf '%s' "${response}" | jq -r --arg b "${BRANCH}" '.result[] | select(.deployment_trigger.metadata.branch==$b) | .id')
            while IFS= read -r id; do
              [ -n "${id}" ] && ids+=("${id}")
            done <<<"${matches}"
            total=$(printf '%s' "${response}" | jq '.result_info.total_pages')
            [ "${page}" -ge "${total}" ] && break
            page=$((page + 1))
          done
          [ ${#ids[@]} -eq 0 ] && exit 0
          printf '%s\n' "${ids[@]}" | xargs -I{} curl -fsS -X DELETE -H "Authorization: Bearer ${TOKEN}" "${api}/{}?force=true"

  cleanup-ghcr-images:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        name:
          - patroni
          - pgbackrest
          - valkey
          - valkey-reconciler
          - argocd-sst-plugin
          - clickhouse
          - clickhouse-keeper
          - clickhouse-backup
    steps:
      - name: Delete GHCR versions for deleted branch
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ matrix.name }}
          BRANCH: ${{ github.event.ref }} # WARNING: do not inline this (security risk)
        run: |
          api="/users/${OWNER,,}/packages/container/${PACKAGE}/versions"
          tag_prefix="ref-$(sed -E 's/[^a-zA-Z0-9._-]+/-/g' <<<"${BRANCH}")-"
          ids=$(gh api --paginate --slurp "${api}" \
            | jq -r --arg p "${tag_prefix}" '
                add | .[]
                | select((.metadata.container.tags // []) | any(startswith($p)))
                | .id')
          if [ -z "${ids}" ]; then
            echo "No ${PACKAGE} versions tagged ${tag_prefix}*; nothing to delete."
            exit 0
          fi
          while read -r id; do
            [ -z "${id}" ] && continue
            echo "Deleting ${PACKAGE} version ${id}"
            gh api --method DELETE "${api}/${id}"
          done <<<"${ids}"

  cleanup-ghcr-charts:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        chart:
          - postgres
          - valkey
          - clickhouse
