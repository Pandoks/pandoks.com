name: Renovate

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: renovatebot/github-action@v40
        with:
          token: ${{ secrets.GH_TOKEN }}
          configurationFile: renovate.json
        env:
          LOG_LEVEL: info
