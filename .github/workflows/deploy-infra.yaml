name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - 'apps/**'
      - '!apps/desktop-template/**'
      - '!apps/example/**'
      - 'packages/svelte/**'
      - 'k3s/**'
      - 'scripts/cluster/**'
  workflow_dispatch:
    inputs:
      stage:
        description: 'SST stage'
        type: choice
        default: production
        options:
          - production
          - pandoks
      deploy:
        description: 'What to deploy'
        type: choice
        default: all
        options:
          - all
          - sst
          - kubernetes

permissions:
  id-token: write
  contents: read

env:
  SST_STAGE: ${{ github.event.inputs.stage || 'production' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      sst: ${{ github.event_name != 'workflow_dispatch' && steps.filter.outputs.sst || contains(fromJSON('["all","sst"]'), inputs.deploy) }}
      kubernetes: ${{ github.event_name != 'workflow_dispatch' && steps.filter.outputs.kubernetes || contains(fromJSON('["all","kubernetes"]'), inputs.deploy) }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            sst:
              - 'infra/**'
              - 'apps/!(desktop-template|example)/**'
              - 'packages/svelte/**'
            kubernetes:
              - 'k3s/**'
              - 'scripts/cluster/**'

  deploy-sst:
    concurrency:
      group: deploy-sst
      cancel-in-progress: false
    needs: detect-changes
    if: needs.detect-changes.outputs.sst == 'true'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      OVH_APPLICATION_SECRET: ${{ secrets.OVH_APPLICATION_SECRET }}
      OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
      TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
      TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # TODO: remove continue-on-error after sst fixes refresh exit code bug
      # https://github.com/anomalyco/sst/issues/6713
      - name: Refresh sst state
        continue-on-error: true
        run: pnpm sst refresh --stage "$SST_STAGE"

      - name: Deploy SST
        run: pnpm sst deploy --stage "$SST_STAGE"

  deploy-kubernetes:
    concurrency:
      group: deploy-kubernetes
      cancel-in-progress: false
    needs:
      - detect-changes
      - deploy-sst
    if: |
      always() &&
      needs.detect-changes.outputs.kubernetes == 'true' &&
      (needs.deploy-sst.result == 'success' || needs.deploy-sst.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Setup Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci,tag:prod

      - name: Sync enabled regional clusters
        run: |
          REGIONS=$(node scripts/cluster/config.ts enabled production)
          if [ "$(jq length <<<"$REGIONS")" -eq 0 ]; then
            echo "No regional clusters enabled — skipping deployment"
            exit 0
          fi
          PEERS=$(sudo tailscale status --peers) || { echo "tailscale status failed"; exit 1; }
          while IFS=$'\t' read -r REGION OPERATOR; do
            if ! grep -Fqw "$OPERATOR" <<<"$PEERS"; then
              echo "$REGION cluster not found — skipping"
              continue
            fi
            sudo tailscale configure kubeconfig "$OPERATOR"
            sudo kubectl annotate application prod-cluster \
              argocd.argoproj.io/refresh=hard \
              --overwrite \
              --namespace argocd
            for _ in {1..60}; do
              STATUS=$(sudo kubectl get application prod-cluster -n argocd -o jsonpath='{.status.sync.status}')
              if [ "$STATUS" = "Synced" ]; then
                echo "$REGION sync successful"
                break
              fi
              ERROR=$(sudo kubectl get application prod-cluster -n argocd -o jsonpath='{.status.conditions[?(@.type=="ComparisonError")].message}')
              if [ -n "$ERROR" ]; then
                echo "$REGION sync failed: $ERROR"
                exit 1
              fi
              sleep 5
            done
            if [ "$STATUS" != "Synced" ]; then
              echo "$REGION sync timed out"
              exit 1
            fi
          done < <(jq -r '.[] | [.id, .operatorHostname] | @tsv' <<<"$REGIONS")
