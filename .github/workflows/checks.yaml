name: Checks

permissions:
  contents: read
  id-token: write

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      prettier: ${{ steps.filter.outputs.prettier }}
      eslint: ${{ steps.filter.outputs.eslint }}
      go: ${{ steps.filter.outputs.go }}
      shell: ${{ steps.filter.outputs.shell }}
      helm: ${{ steps.filter.outputs.helm }}
      actions: ${{ steps.filter.outputs.actions }}
      renovate: ${{ steps.filter.outputs.renovate }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            prettier:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.svelte'
              - '**/*.md'
              - '**/*.json'
              - '**/*.yaml'
              - '**/*.yml'
              - '**/*.css'
              - '.prettierrc'
              - '.prettierignore'
            eslint:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.svelte'
              - 'eslint.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
            go:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
            shell:
              - '**/*.sh'
              - '.shellcheckrc'
            helm:
              - '**/chart/**'
            actions:
              - '.github/workflows/**'
            renovate:
              - 'renovate.json'
              - 'renovate.json5'
              - '.renovaterc'
              - '.renovaterc.json'
              - '.renovaterc.json5'
            infra:
              - 'infra/**'
              - 'sst.config.ts'
              - 'tsconfig.json'
              - 'package.json'
              - 'pnpm-lock.yaml'

  # ─── JS / TS ──────────────────────────────────────────────────────────
  format-js:
    needs: detect-changes
    if: needs.detect-changes.outputs.prettier == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier check
        run: pnpm format check js

  lint-js:
    needs: detect-changes
    if: needs.detect-changes.outputs.eslint == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint js

  # ─── Go ───────────────────────────────────────────────────────────────
  format-go:
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/valkey/reconciler/go.mod
          cache-dependency-path: packages/valkey/reconciler/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run format check
        run: pnpm format check go

  lint-go:
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/valkey/reconciler/go.mod
          cache-dependency-path: packages/valkey/reconciler/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run lint
        run: pnpm lint go

      - name: Run govulncheck
        run: |
          for d in $(go list -m -f '{{.Dir}}'); do
            (cd "$d" && govulncheck ./...)
          done

  # ─── Shell ────────────────────────────────────────────────────────────
  format-shell:
    needs: detect-changes
    if: needs.detect-changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Install shfmt
        run: sudo apt-get update && sudo apt-get install -y shfmt

      - name: Run format check
        run: pnpm format check shell

  lint-shell:
    needs: detect-changes
    if: needs.detect-changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Run ShellCheck
        run: pnpm lint shell

  # ─── Helm ─────────────────────────────────────────────────────────────
  lint-helm:
    needs: detect-changes
    if: needs.detect-changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          # renovate: datasource=github-releases packageName=helm/helm
          version: 'v4.2.0'

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Run helm lint chain
        run: pnpm lint helm

  # ─── GitHub Actions ───────────────────────────────────────────────────
  lint-actions:
    needs: detect-changes
    if: needs.detect-changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          fail_level: info

  # ─── Renovate ─────────────────────────────────────────────────────────
  validate-renovate:
    needs: detect-changes
    if: needs.detect-changes.outputs.renovate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate renovate.json
        run: >
          docker run --rm
          -v "${{ github.workspace }}:/repo" -w /repo
          --entrypoint renovate-config-validator
          ghcr.io/renovatebot/renovate:43
          --strict --no-global renovate.json

  # ─── Workspace checks ─────────────────────────────────────────────────
  workspace-check:
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      # NOTE: If a workspace `check` adds a non-npm system binary (Go, helm, hadolint, etc.),
      # add a `detect-changes`-gated install step above this — mirror the pattern in
      # the `format-go` / `lint-helm` jobs.
      - name: Run workspace checks
        env:
          BASE: ${{ github.base_ref || 'main' }}
        run: pnpm --filter "...[origin/${BASE}]" --if-present check

  # ─── Infra typecheck ──────────────────────────────────────────────────
  check-infra:
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck infra
        run: pnpm check:infra

  # ─── SST ──────────────────────────────────────────────────────────────
  diff-sst:
    runs-on: ubuntu-latest
    environment: production
    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Diff SST
        run: pnpm sst diff --stage production

  checks-pass:
    needs:
      - format-js
      - lint-js
      - format-go
      - lint-go
      - format-shell
      - lint-shell
      - lint-helm
      - lint-actions
      - validate-renovate
      - workspace-check
      - check-infra
      - diff-sst
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "ok"
