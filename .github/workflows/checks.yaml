name: Checks

permissions:
  contents: read
  id-token: write

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      prettier: ${{ steps.filter.outputs.prettier }}
      eslint: ${{ steps.filter.outputs.eslint }}
      go: ${{ steps.filter.outputs.go }}
      shell: ${{ steps.filter.outputs.shell }}
      swift: ${{ steps.filter.outputs.swift }}
      kotlin: ${{ steps.filter.outputs.kotlin }}
      helm: ${{ steps.filter.outputs.helm }}
      actions: ${{ steps.filter.outputs.actions }}
      renovate: ${{ steps.filter.outputs.renovate }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            prettier:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.svelte'
              - '**/*.md'
              - '**/*.json'
              - '**/*.yaml'
              - '**/*.yml'
              - '**/*.css'
              - '.prettierrc'
              - '.prettierignore'
            eslint:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.svelte'
              - 'eslint.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
            go:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
            shell:
              - '**/*.sh'
              - '.shellcheckrc'
            swift:
              - '**/*.swift'
              - '.swiftlint.yml'
              - '.swift-format'
            kotlin:
              - '**/*.kt'
              - '**/*.kts'
              - '.editorconfig'
            helm:
              - '**/chart/**'
            actions:
              - '.github/workflows/**'
            renovate:
              - 'renovate.json'
              - 'renovate.json5'
              - '.renovaterc'
              - '.renovaterc.json'
              - '.renovaterc.json5'
            infra:
              - 'infra/**'
              - 'sst.config.ts'
              - 'tsconfig.json'
              - 'package.json'
              - 'pnpm-lock.yaml'

  # ─── JS / TS ──────────────────────────────────────────────────────────
  format-js:
    needs: detect-changes
    if: needs.detect-changes.outputs.prettier == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run Prettier check
        run: pnpm format check js

  lint-js:
    needs: detect-changes
    if: needs.detect-changes.outputs.eslint == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run ESLint
        run: pnpm lint js

  # ─── Go ───────────────────────────────────────────────────────────────
  format-go:
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/valkey/reconciler/go.mod
          cache-dependency-path: |
            apps/push-worker/go.sum
            packages/valkey/reconciler/go.sum

      - uses: ./.github/actions/setup-mise
        with:
          tools: golangci-lint

      - name: Run format check
        run: pnpm format check go

  lint-go:
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/valkey/reconciler/go.mod
          cache-dependency-path: |
            apps/push-worker/go.sum
            packages/valkey/reconciler/go.sum

      - uses: ./.github/actions/setup-mise
        with:
          tools: golangci-lint go:golang.org/x/vuln/cmd/govulncheck

      - name: Run lint
        run: pnpm lint go

      - name: Run govulncheck
        run: |
          for d in $(go list -m -f '{{.Dir}}'); do
            (cd "$d" && govulncheck ./...)
          done

  # ─── Shell ────────────────────────────────────────────────────────────
  format-shell:
    needs: detect-changes
    if: needs.detect-changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-mise
        with:
          tools: shfmt

      - name: Run format check
        run: ./scripts/format/main.sh check shell

  lint-shell:
    needs: detect-changes
    if: needs.detect-changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-mise
        with:
          tools: shellcheck

      - name: Run ShellCheck
        run: ./scripts/lint/main.sh shell

  # ─── Swift ────────────────────────────────────────────────────────────
  checks-swift:
    needs: detect-changes
    if: needs.detect-changes.outputs.swift == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-mise
        with:
          tools: swiftlint

      # swift-format is not in the mise registry
      - name: Install swift-format
        run: brew install swift-format

      - name: Run SwiftLint
        run: ./scripts/lint/main.sh swift

      - name: Run swift-format check
        run: ./scripts/format/main.sh check swift

  # ─── Kotlin ───────────────────────────────────────────────────────────
  checks-kotlin:
    needs: detect-changes
    if: needs.detect-changes.outputs.kotlin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-mise
        with:
          tools: java ktlint

      - name: Run ktlint
        run: ./scripts/lint/main.sh kotlin

  # ─── Helm ─────────────────────────────────────────────────────────────
  lint-helm:
    needs: detect-changes
    if: needs.detect-changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-mise
        with:
          tools: helm kubeconform

      - name: Run helm lint chain
        run: ./scripts/lint/main.sh helm

  # ─── GitHub Actions ───────────────────────────────────────────────────
  lint-actions:
    needs: detect-changes
    if: needs.detect-changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          fail_level: info

  # ─── Renovate ─────────────────────────────────────────────────────────
  validate-renovate:
    needs: detect-changes
    if: needs.detect-changes.outputs.renovate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate renovate.json
        run: >
          docker run --rm
          -v "${{ github.workspace }}:/repo" -w /repo
          --entrypoint renovate-config-validator
          ghcr.io/renovatebot/renovate:43
          --strict --no-global renovate.json

  # ─── Workspace checks ─────────────────────────────────────────────────
  workspace-check:
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-pnpm

      # NOTE: If a workspace `check` adds a non-npm system binary (Go, helm, hadolint, etc.),
      # add a `detect-changes`-gated install step above this — mirror the pattern in
      # the `format-go` / `lint-helm` jobs.
      - name: Run workspace checks
        env:
          BASE: ${{ github.base_ref || 'main' }}
        run: pnpm --filter "...[origin/${BASE}]" --if-present check

  # ─── Infra typecheck ──────────────────────────────────────────────────
  check-infra:
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Typecheck infra
        run: pnpm check:infra

  # ─── SST ──────────────────────────────────────────────────────────────
  diff-sst:
    runs-on: ubuntu-latest
    environment: production
    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Diff SST
        run: pnpm sst diff --stage production

  checks-pass:
    needs:
      - format-js
      - lint-js
      - format-go
      - lint-go
      - format-shell
      - lint-shell
      - checks-swift
      - checks-kotlin
      - lint-helm
      - lint-actions
      - validate-renovate
      - workspace-check
      - check-infra
      - diff-sst
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "ok"
