name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      k3s: ${{ steps.filter.outputs.k3s || github.event_name != 'pull_request' }}
    steps:
      - uses: actions/checkout@v6

      - id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            k3s:
              - 'k3s/**'

  scan-published-images:
    # NOTE: we don't scan charts because the only issues are misconfigs, not CVEs.
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        name:
          - patroni
          - pgbackrest
          - valkey
          - valkey-reconciler
          - argocd-sst-plugin
          - clickhouse
          - clickhouse-keeper
          - clickhouse-backup
    steps:
      - uses: actions/checkout@v6

      - name: Compute image reference
        id: ref
        env:
          OWNER: ${{ github.repository_owner }}
          NAME: ${{ matrix.name }}
        run: |
          lowercase_owner=$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${lowercase_owner}/${NAME}:latest" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
        run: docker pull "${IMAGE}"

      - name: Scan published image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          scanners: vuln,secret
          trivy-config: trivy.yaml
          trivyignores: .trivyignore.yaml
          format: sarif
          output: trivy-published-${{ matrix.name }}.sarif
          exit-code: '0'

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-published-${{ matrix.name }}.sarif
          category: trivy-published-${{ matrix.name }}

  scan-k3s-config:
    needs: detect-changes
    if: needs.detect-changes.outputs.k3s == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan k3s manifests with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: k3s
          scanners: misconfig
          trivy-config: trivy.yaml
          trivyignores: .trivyignore.yaml
          format: sarif
          output: trivy-k3s.sarif
          exit-code: '0'

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-k3s.sarif
          category: trivy-k3s

  check:
    needs:
      - scan-k3s-config
    if: ${{ always() && !cancelled() && github.event_name == 'pull_request' && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "ok"
