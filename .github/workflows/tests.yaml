name: Tests

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      desktop: ${{ steps.filter.outputs.desktop }}
      svelte: ${{ steps.filter.outputs.svelte }}
      valkey-reconciler: ${{ steps.filter.outputs.valkey-reconciler }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/svelte/**'
            desktop:
              - 'apps/desktop-template/**'
              - 'packages/svelte/**'
            svelte:
              - 'packages/svelte/**'
            valkey-reconciler:
              - 'packages/valkey/reconciler/**'

  test-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @pandoks.com/web exec playwright install --with-deps chromium

      - name: Run web tests
        run: pnpm --filter @pandoks.com/web test

  test-desktop:
    needs: detect-changes
    if: needs.detect-changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @pandoks.com/desktop-template exec playwright install --with-deps chromium

      - name: Run desktop tests
        run: pnpm --filter @pandoks.com/desktop-template test

  test-svelte-pkg:
    needs: detect-changes
    if: needs.detect-changes.outputs.svelte == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @pandoks.com/svelte exec playwright install --with-deps chromium

      - name: Run svelte package tests
        run: pnpm --filter @pandoks.com/svelte test

  test-valkey-reconciler:
    needs: detect-changes
    if: needs.detect-changes.outputs.valkey-reconciler == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'pnpm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/valkey/reconciler/go.mod
          cache-dependency-path: packages/valkey/reconciler/go.sum

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @pandoks.com/valkey test

  tests-pass:
    needs:
      - test-web
      - test-desktop
      - test-svelte-pkg
      - test-valkey-reconciler
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "ok"
