name: Maintenance

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ secrets.GH_TOKEN }}
        env:
          LOG_LEVEL: info
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: 'true'
          RENOVATE_REQUIRE_CONFIG: required
          RENOVATE_GIT_AUTHOR: 'Renovate Bot <renovate@pandoks.com>'

  cleanup-orphan-ghcr-versions:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - patroni
          - pgbackrest
          - valkey
          - valkey-reconciler
          - argocd-sst-plugin
          - clickhouse
          - clickhouse-keeper
          - clickhouse-backup
          - charts/postgres
          - charts/valkey
          - charts/clickhouse
    steps:
      - name: Delete orphan untagged versions for ${{ matrix.package }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGE_MANAGEMENT_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ matrix.package }}
        run: |
          api="/users/${OWNER,,}/packages/container/${PACKAGE//\//%2F}/versions"
          repo="${OWNER,,}/${PACKAGE}"
          all=$(gh api --paginate --slurp "${api}" | jq 'add')
          token=$(curl -fsSL "https://ghcr.io/token?scope=repository:${repo}:pull" | jq -r '.token')
          referenced=$(jq -r '.[] | select(.metadata.container.tags != []) | .name' <<<"${all}" \
            | xargs -I{} curl -fsSL -H "Authorization: Bearer ${token}" -H 'Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json' "https://ghcr.io/v2/${repo}/manifests/{}" 2>/dev/null \
            | jq -rs '[.[].manifests[]?.digest] | unique[]')
          jq -r --argjson refs "$(jq -Rn '[inputs]' <<<"${referenced}")" \
            '.[] | select(.metadata.container.tags == []) | select(.name as $d | $refs | index($d) | not) | .id' <<<"${all}" \
            | xargs -rI{} gh api --method DELETE "${api}/{}"
