name: Maintenance

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: maintenance
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ secrets.GH_TOKEN }}
        env:
          LOG_LEVEL: info
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: 'true'
          RENOVATE_REQUIRE_CONFIG: required
          RENOVATE_GIT_AUTHOR: 'Renovate Bot <renovate@pandoks.com>'

  cleanup-orphan-ghcr-versions:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - patroni
          - pgbackrest
          - valkey
          - valkey-reconciler
          - argocd-sst-plugin
          - clickhouse
          - clickhouse-keeper
          - clickhouse-backup
          - charts/postgres
          - charts/valkey
          - charts/clickhouse
    steps:
      - name: Delete orphan untagged GHCR versions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGE_MANAGEMENT_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ matrix.package }}
        run: |
          encoded_pkg="${PACKAGE//\//%2F}"
          repo_path="${OWNER,,}/${PACKAGE,,}"
          api="/users/${OWNER,,}/packages/container/${encoded_pkg}/versions"

          all=$(gh api --paginate "${api}")
          tagged=$(jq -c '[.[] | select((.metadata.container.tags // []) | length > 0)]' <<<"${all}")
          untagged_digests=$(jq -r '.[] | select((.metadata.container.tags // []) | length == 0) | .name' <<<"${all}")
          if [ -z "${untagged_digests}" ]; then
            echo "No untagged versions for ${PACKAGE}; nothing to do."
            exit 0
          fi

          token=$(curl -fsSL "https://ghcr.io/token?scope=repository:${repo_path}:pull" | jq -r '.token')
          accept='application/vnd.oci.image.index.v1+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.docker.distribution.manifest.v2+json'

          referenced=$(mktemp)
          while read -r digest; do
            [ -z "${digest}" ] && continue
            manifest=$(curl -fsSL -H "Authorization: Bearer ${token}" -H "Accept: ${accept}" "https://ghcr.io/v2/${repo_path}/manifests/${digest}" 2>/dev/null || true)
            [ -z "${manifest}" ] && continue
            jq -r '.. | objects | select(has("digest")) | .digest' <<<"${manifest}" 2>/dev/null >>"${referenced}" || true
          done < <(jq -r '.[] | .name' <<<"${tagged}")
          sort -u "${referenced}" -o "${referenced}"

          deleted=0
          kept=0
          while IFS=$'\t' read -r id digest; do
            [ -z "${id}" ] && continue
            if grep -qxF "${digest}" "${referenced}"; then
              kept=$((kept + 1))
              continue
            fi
            echo "Deleting orphan ${PACKAGE} version ${id} (${digest})"
            gh api --method DELETE "${api}/${id}" >/dev/null
            deleted=$((deleted + 1))
          done < <(jq -r '.[] | select((.metadata.container.tags // []) | length == 0) | [.id, .name] | @tsv' <<<"${all}")

          rm -f "${referenced}"
          echo "${PACKAGE}: deleted ${deleted} orphan, kept ${kept} live referrer(s)."
