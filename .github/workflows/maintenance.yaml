name: Maintenance

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ secrets.GH_TOKEN }}
        env:
          LOG_LEVEL: info
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: 'true'
          RENOVATE_REQUIRE_CONFIG: required
          RENOVATE_GIT_AUTHOR: 'Renovate Bot <renovate@pandoks.com>'

  cleanup-orphan-ghcr-images:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        name:
          - patroni
          - pgbackrest
          - valkey
          - valkey-reconciler
          - argocd-sst-plugin
          - clickhouse
          - clickhouse-keeper
          - clickhouse-backup
    steps:
      - name: Delete orphan untagged GHCR image versions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGE_MANAGEMENT_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ matrix.name }}
        run: |
          api="/users/${OWNER,,}/packages/container/${PACKAGE}/versions"
          repo="${OWNER,,}/${PACKAGE}"
          all=$(gh api --paginate --slurp "${api}" | jq 'add')
          tagged_digests=$(jq -r '.[] | select((.metadata.container.tags // []) | length > 0) | .name' <<<"${all}")
          token=$(curl -fsSL "https://ghcr.io/token?scope=repository:${repo}:pull" | jq -r '.token')
          referenced=$(while read -r d; do
            [ -z "${d}" ] && continue
            curl -fsSL -H "Authorization: Bearer ${token}" -H 'Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json' "https://ghcr.io/v2/${repo}/manifests/${d}" 2>/dev/null \
              | jq -r '.manifests[]?.digest // empty'
          done <<<"${tagged_digests}" | sort -u)
          ids=$(jq -r --argjson refs "$(jq -Rn '[inputs | select(length>0)]' <<<"${referenced}")" '
            .[] | select((.metadata.container.tags // []) | length == 0) | select(.name as $d | $refs | index($d) | not) | .id' <<<"${all}")
          if [ -z "${ids}" ]; then
            echo "No orphan ${PACKAGE} versions to delete."
            exit 0
          fi
          while read -r id; do
            [ -z "${id}" ] && continue
            echo "Deleting orphan ${PACKAGE} version ${id}"
            gh api --method DELETE "${api}/${id}"
          done <<<"${ids}"

  cleanup-orphan-ghcr-charts:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        chart:
          - postgres
          - valkey
          - clickhouse
    steps:
      - name: Delete orphan untagged GHCR chart versions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGE_MANAGEMENT_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          CHART: ${{ matrix.chart }}
        run: |
          api="/users/${OWNER,,}/packages/container/charts%2F${CHART}/versions"
          repo="${OWNER,,}/charts/${CHART}"
          all=$(gh api --paginate --slurp "${api}" | jq 'add')
          tagged_digests=$(jq -r '.[] | select((.metadata.container.tags // []) | length > 0) | .name' <<<"${all}")
          token=$(curl -fsSL "https://ghcr.io/token?scope=repository:${repo}:pull" | jq -r '.token')
          referenced=$(while read -r d; do
            [ -z "${d}" ] && continue
            curl -fsSL -H "Authorization: Bearer ${token}" -H 'Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json' "https://ghcr.io/v2/${repo}/manifests/${d}" 2>/dev/null \
              | jq -r '.manifests[]?.digest // empty'
          done <<<"${tagged_digests}" | sort -u)
          ids=$(jq -r --argjson refs "$(jq -Rn '[inputs | select(length>0)]' <<<"${referenced}")" '
            .[] | select((.metadata.container.tags // []) | length == 0) | select(.name as $d | $refs | index($d) | not) | .id' <<<"${all}")
          if [ -z "${ids}" ]; then
            echo "No orphan ${CHART} chart versions to delete."
            exit 0
          fi
          while read -r id; do
            [ -z "${id}" ] && continue
            echo "Deleting orphan ${CHART} chart version ${id}"
            gh api --method DELETE "${api}/${id}"
          done <<<"${ids}"
