name: Setup mise tools
description: Install declared tools from mise.toml via jdx/mise-action, with the trusted-config-path and mise version pin applied once.

inputs:
  tools:
    description: Space-separated tools to install (passed to mise install as install_args), e.g. "shfmt" or "golangci-lint go:golang.org/x/vuln/cmd/govulncheck".
    required: true

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      env:
        MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
      with:
        version: 2026.7.7
        install_args: ${{ inputs.tools }}
