name: Setup mise tools
description: Install pinned tools from mise.toml via jdx/mise-action, with the trusted-config-path and mise version pin applied once.

inputs:
  tools:
    description: Space-separated tools to install (passed to mise install as install_args), e.g. "shfmt" or "golangci-lint go:golang.org/x/vuln/cmd/govulncheck".
    required: true

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      env:
        MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
      with:
        version: 2026.7.7
        install_args: ${{ inputs.tools }}
