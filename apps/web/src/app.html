<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    %sveltekit.head%

    <link rel="preconnect" href="https://static.cloudflareinsights.com" crossorigin />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="%sveltekit.assets%/favicon/favicon-96x96.png"
    />
    <link rel="shortcut icon" href="%sveltekit.assets%/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%sveltekit.assets%/favicon/apple-touch-icon.png"
    />

    <!-- Fonts (inline critical fonts handle first render; these cache the full files for SPA nav) -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
      fetchpriority="high"
      href="/fonts/Inter.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
      fetchpriority="high"
      href="/fonts/Inter-Italic.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
      fetchpriority="high"
      href="/fonts/EBGaramond.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
      fetchpriority="high"
      href="/fonts/EBGaramond-Italic.woff2"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body data-sveltekit-preload-data="hover">
    <main style="display: contents">%sveltekit.body%</main>
  </body>
</html>
