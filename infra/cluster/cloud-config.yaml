#cloud-config
package_update: false
package_upgrade: false
ssh_pwauth: false
disable_root: true

write_files:
  - path: /etc/pandoks/cluster.env
    owner: root:root
    permissions: '0600'
    encoding: b64
    content: ${BOOTSTRAP_ENV_BASE64}
  - path: /usr/local/sbin/pandoks-cluster-bootstrap
    owner: root:root
    permissions: '0755'
    encoding: b64
    content: ${BOOTSTRAP_SCRIPT_BASE64}
  - path: /etc/systemd/system/pandoks-cluster-bootstrap.service
    owner: root:root
    permissions: '0644'
    encoding: b64
    content: ${BOOTSTRAP_SERVICE_BASE64}

runcmd:
  - systemctl daemon-reload
  - systemctl enable --now pandoks-cluster-bootstrap.service
