plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.pandoks.imageclassifier'
version = '0.1.0'

android {
  namespace "com.pandoks.imageclassifier"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "com.google.mlkit:image-labeling:17.0.9"
}
