apiVersion: v1
kind: ConfigMap
metadata:
  name: valkey-{{ .Values.name }}-config
  namespace: {{ .Values.namespace }}
data:
  valkey.conf: |
{{ .Files.Get "files/valkey.conf" | indent 4 }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: valkey-{{ .Values.name }}-acl
  namespace: {{ .Values.namespace }}
data:
  users.acl: |
{{ .Files.Get "files/users.acl" | indent 4 }}

---
apiVersion: v1
kind: Service
metadata:
  name: valkey-{{ .Values.name }}-headless
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: valkey
    database: {{ .Values.name }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: valkey-{{ .Values.name }}
  ports:
    - name: client
      port: 6379
      targetPort: 6379
    - name: bus
      port: 16379
      targetPort: 16379
    - name: metrics
      port: 9121
      targetPort: 9121

---
apiVersion: v1
kind: Service
metadata:
  name: valkey-{{ .Values.name }}-cluster
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  selector:
    app: valkey-{{ .Values.name }}
  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: &app valkey-{{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: *app
spec:
  serviceName: &service valkey-{{ .Values.name }}-headless
  podManagementPolicy: Parallel
  replicas: {{ add .Values.cluster.masters (mul .Values.cluster.masters .Values.cluster.replicasPerMaster) }}
  selector:
    matchLabels:
      app: *app
  template:
    metadata:
      labels:
        app: *app
    spec:
      tolerations:
        - key: pandoks.com/workload
          operator: Equal
          value: database
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: pandoks.com/workload
                    operator: In
                    values: [database]
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: *app
              topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: {{ .Values.image }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: client
              containerPort: 6379
            - name: bus
              containerPort: 16379
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: HEADLESS_SERVICE
              value: *service
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.persistence }}
            - name: PERSISTENCE
              value: {{ .Values.persistence }}
            {{- end }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: &creds-secret {{ .Values.credentials.secret }}
                  key: &admin-key {{ .Values.credentials.dataKeys.adminPassword }}
            - name: CLIENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: *creds-secret
                  key: {{ .Values.credentials.dataKeys.clientPassword }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: &data data
              mountPath: /data
            - name: &config config
              mountPath: /tmp/conf_templates/valkey.conf
              subPath: valkey.conf
            - name: &acl acl
              mountPath: /tmp/conf_templates/users.acl
              subPath: users.acl
            - name: &etc-valkey etc-valkey
              mountPath: /etc/valkey
            - name: &tmp tmp
              mountPath: /tmp
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli --user admin -a "$ADMIN_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
        - name: prometheus-exporter
          image: oliver006/redis_exporter:v1.80.1
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: metrics
              containerPort: 9121
              protocol: TCP
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
            - name: REDIS_USER
              value: "admin"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: *creds-secret
                  key: *admin-key
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9121
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 9121
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: *config
          configMap:
            name: valkey-{{ .Values.name }}-config
        - name: *acl
          configMap:
            name: valkey-{{ .Values.name }}-acl
        - name: *etc-valkey
          emptyDir: {}
        - name: *tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: *data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 999Pi # local-path does not support storage requests so we use a big number just to show that it's uncapped
