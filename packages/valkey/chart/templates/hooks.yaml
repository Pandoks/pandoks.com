apiVersion: batch/v1
kind: Job
metadata:
  name: valkey-{{ .Values.name }}-init
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": {{ .Values.hooks.hookDeletePolicy }}
spec:
  backoffLimit: {{ .Values.hooks.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.hooks.ttlSecondsAfterFinished }}
  template:
    spec:
      serviceAccountName: valkey-{{ .Values.name }}-reconciler
      restartPolicy: {{ .Values.hooks.restartPolicy }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init
          image: {{ .Values.cluster.reconcilerImage }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: &tmp tmp
              mountPath: /tmp
          args:
            - init
          env:
            - name: CLUSTER_NAME
              value: {{ .Values.name }}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MASTERS
              value: {{ .Values.cluster.masters | quote }}
            - name: REPLICAS_PER_MASTER
              value: {{ .Values.cluster.replicasPerMaster | quote }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.secret }}
                  key: {{ .Values.credentials.dataKeys.adminPassword }}
      volumes:
        - name: *tmp
          emptyDir: {}

