name: example
namespace: example
image: ghcr.io/pandoks/valkey:latest@sha256:9a08d85039741706c5112c28ae0d4b5085004cd3ac547f77c0b6a87c230f1ab3

credentials:
  secret: valkey-example-creds
  dataKeys:
    adminPassword: ADMIN_PASSWORD
    clientPassword: CLIENT_PASSWORD

cluster:
  masters: 1
  replicasPerMaster: 0
  reconcilerImage: ghcr.io/pandoks/valkey-reconciler:latest@sha256:dcc64f2671be7921dc12a19b834c4c494963b8a90af3e58463578373446ce713

# No persistence by default
# options: rdb,aof | rdb | aof | ~
persistence: ~

resources:
  limits:
    cpu: 1000m
    memory: 1Gi

hooks:
  ttlSecondsAfterFinished: ~
  backoffLimit: ~
  restartPolicy: OnFailure
  hookDeletePolicy: before-hook-creation,hook-succeeded
