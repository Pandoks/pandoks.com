apiVersion: v1
kind: ConfigMap
metadata:
  name: patroni-{{ .Values.db }}-config
  namespace: {{ .Values.namespace }}
data:
  patroni.yaml: |
{{ .Files.Get "files/patroni.yaml" | indent 4 }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: patroni-{{ .Values.db }}-pgbackrest-config
  namespace: {{ .Values.namespace }}
data:
  pgbackrest.conf: |
{{ .Files.Get "files/pgbackrest.conf" | indent 4 }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbackrest-{{ .Values.db }}-backup-server-config
  namespace: {{ .Values.namespace }}
data:
  pgbackrest.conf: |
{{ .Files.Get "files/pgbackrest-server.conf" | indent 4 }}

{{- range $shardIndex := until (int $.Values.patroni.shards) }}
---
# provides a stable ip for the primary
apiVersion: v1
kind: Service
metadata:
  name: patroni-{{ $.Values.db }}-primary-shard-{{ $shardIndex }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: &app patroni-{{ $.Values.db }}-shard-{{ $shardIndex }}
    cluster-name: &cluster-name {{ $.Values.db }}-shard-{{ $shardIndex }}
    role: &role primary
spec:
  type: ClusterIP
  selector:
    app: *app
    cluster-name: *cluster-name
    role: *role
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
    - name: pgbackrest
      port: 8432
      targetPort: 8432

---
# provides a stable ip for all replicas
apiVersion: v1
kind: Service
metadata:
  name: patroni-{{ $.Values.db }}-replicas-shard-{{ $shardIndex }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: &app patroni-{{ $.Values.db }}-shard-{{ $shardIndex }}
    cluster-name: &cluster-name {{ $.Values.db }}-shard-{{ $shardIndex }}
    role: &role replica
spec:
  type: ClusterIP
  selector:
    app: *app
    cluster-name: *cluster-name
    role: *role
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
    - name: pgbackrest
      port: 8432
      targetPort: 8432

---
apiVersion: v1
kind: Service
metadata:
  name: &name patroni-{{ $.Values.db }}-shard-{{ $shardIndex }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: *name
    app.kubernetes.io/name: patroni
    database: {{ $.Values.db }}
    cluster-name: &cluster-name {{ $.Values.db }}-shard-{{ $shardIndex }}
spec:
  clusterIP: None
  selector:
    app: *name
    cluster-name: *cluster-name
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
    - name: patroni
      port: 8008
      targetPort: 8008
    - name: pg-metrics
      port: 9187
      targetPort: 9187

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: &app patroni-{{ $.Values.db }}-shard-{{ $shardIndex }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: *app
    cluster-name: &cluster-name {{ $.Values.db }}-shard-{{ $shardIndex }}
spec:
  replicas: {{ $.Values.patroni.replicasPerShard }}
  serviceName: patroni-{{ $.Values.db }}-shard-{{ $shardIndex }}
  selector:
    matchLabels:
      app: *app
      cluster-name: *cluster-name
  template:
    metadata:
      labels:
        app: *app
        cluster-name: *cluster-name
    spec:
      tolerations:
        - key: pandoks.com/workload
          operator: Equal
          value: database
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: pandoks.com/workload
                    operator: In
                    values: [database]
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: *app
                  cluster-name: *cluster-name
              topologyKey: kubernetes.io/hostname
      serviceAccountName: patroni-{{ $.Values.db }}-shard-{{ $shardIndex }}
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: patroni
          image: {{ $.Values.patroni.image }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /readiness
              port: 8008
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          ports:
            - containerPort: 8008
              protocol: TCP
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: &db-name {{ $.Values.db }}
            - name: APP_NAME
              value: *app
            - name: CLUSTER_NAME
              value: *cluster-name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: &db-creds {{ $.Values.credentials.secret }}
                  key: &superuser-key {{ $.Values.credentials.dataKeys.superuserPassword }}
            - name: REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: *db-creds
                  key: {{ $.Values.credentials.dataKeys.replicationPassword }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: *db-creds
                  key: {{ $.Values.credentials.dataKeys.adminPassword }}
            - name: CLIENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: *db-creds
                  key: {{ $.Values.credentials.dataKeys.clientPassword }}
            - name: PATRONI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: *db-creds
                  key: {{ $.Values.credentials.dataKeys.patroniPassword }}
            - name: BACKUP_BUCKET
              value: &backup-bucket {{ $.Values.backup.bucket }}
            - name: BACKUP_PATH
              value: &backup-path {{ $.Values.backup.path }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: &backup-creds {{ $.Values.backup.credentials.secret }}
                  key: &s3-key {{ $.Values.backup.credentials.dataKeys.accessKey }}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: *backup-creds
                  key: &s3-key-secret {{ $.Values.backup.credentials.dataKeys.secretKey }}
            - name: S3_REGION
              value: &s3-region {{ $.Values.s3.region }}
            - name: S3_HOST
              value: &s3-host {{ $.Values.s3.host }}
            - name: S3_TLS
              value: &s3-tls {{ $.Values.s3.tls | quote }}
            - name: S3_URI_STYLE
              value: &s3-uri-style {{ $.Values.s3.uriStyle }}
            - name: ENCRYPTION_KEY
              value: &encryption-key {{ $.Values.backup.encryptionKey }}
            - name: BACKUP_HOST_COMMON_NAME
              value: &backup-host-common-name {{ $.Values.db }}-shard-{{ $shardIndex }}-pgbackrest-backup
            - name: STANZA
              value: *cluster-name
          {{- with $.Values.patroni.resources.patroni }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: &patroni-config patroni-config
              mountPath: /tmp/conf_templates/patroni.yaml
              subPath: patroni.yaml
            - name: &pgbackrest-config pgbackrest-config
              mountPath: &pgbackrest-mount /tmp/conf_templates/pgbackrest.conf
              subPath: pgbackrest.conf
            - name: &data patroni-data
              mountPath: &data-mount /var/lib/postgresql
            - name: &wal-archives patroni-wal-archives
              mountPath: &wal-archives-mount /var/spool/pgbackrest
            - name: &socket postgres-socket
              mountPath: &socket-mount /var/run/postgresql
            - name: &etc-patroni etc-patroni
              mountPath: /etc/patroni
            - name: &patroni-etc-pgbackrest patroni-etc-pgbackrest
              mountPath: /etc/pgbackrest
            - name: &patroni-tmp patroni-tmp
              mountPath: /tmp
        - name: pgbackrest
          image: {{ $.Values.backup.image }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          args:
            - pgbackrest
            - server
          ports:
            - name: pgbackrest
              containerPort: 8432
          env:
            - name: POSTGRES_DB
              value: *db-name
            - name: BACKUP_BUCKET
              value: *backup-bucket
            - name: BACKUP_PATH
              value: *backup-path
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: *backup-creds
                  key: *s3-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: *backup-creds
                  key: *s3-key-secret
            - name: S3_REGION
              value: *s3-region
            - name: S3_HOST
              value: *s3-host
            - name: S3_TLS
              value: *s3-tls
            - name: S3_URI_STYLE
              value: *s3-uri-style
            - name: ENCRYPTION_KEY
              value: *encryption-key
            - name: BACKUP_HOST_COMMON_NAME
              value: *backup-host-common-name
            - name: STANZA
              value: *cluster-name
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: *db-creds
                  key: *superuser-key
          {{- with $.Values.patroni.resources.pgbackrest }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: *pgbackrest-config
              mountPath: *pgbackrest-mount
              subPath: pgbackrest.conf
            - name: &sidecar-etc-pgbackrest sidecar-etc-pgbackrest
              mountPath: /etc/pgbackrest
            - name: &tls tls
              mountPath: /etc/pgbackrest/certs
              readOnly: true
            - name: *data
              mountPath: *data-mount
            - name: *wal-archives
              mountPath: *wal-archives-mount
            - name: *socket
              mountPath: *socket-mount
            - name: &pgbackrest-tmp pgbackrest-tmp
              mountPath: /tmp
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.18.1
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: pg-metrics
              containerPort: 9187
              protocol: TCP
          args:
            - --collector.stat_statements
            - --collector.long_running_transactions
            - --collector.stat_activity_autovacuum
            - --collector.database_wraparound
            - --collector.postmaster
            - --collector.stat_bgwriter
            - --collector.stat_checkpointer
            - --collector.replication
            - --collector.stat_user_tables
            - --collector.statio_user_tables
          env:
            - name: DATA_SOURCE_URI
              value: "localhost:5432/{{ $.Values.db }}?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: postgres
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: *db-creds
                  key: *superuser-key
          {{- with $.Values.patroni.resources.postgresExporter }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: &exporter-tmp exporter-tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: *patroni-config
          configMap:
            name: patroni-{{ $.Values.db }}-config
        - name: *pgbackrest-config
          configMap:
            name: patroni-{{ $.Values.db }}-pgbackrest-config
        - name: *etc-patroni
          emptyDir: {}
        - name: *patroni-etc-pgbackrest
          emptyDir: {}
        - name: *sidecar-etc-pgbackrest
          emptyDir: {}
        - name: *patroni-tmp
          emptyDir: {}
        - name: *pgbackrest-tmp
          emptyDir: {}
        - name: *exporter-tmp
          emptyDir: {}
        - name: *tls
          projected:
            defaultMode: 0600
            sources:
              - secret:
                  name: patroni-{{ $.Values.db }}-shard-{{ $shardIndex }}-tls
                  items:
                    - key: tls.crt
                      path: client.crt
                    - key: tls.key
                      path: client.key
                    - key: ca.crt
                      path: ca.crt
              - secret:
                  name: {{ $.Values.db }}-shard-{{ $shardIndex }}-pgbackrest-backup-tls
                  items:
                    - key: tls.crt
                      path: server.crt
                    - key: tls.key
                      path: server.key
        - name: *socket
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: *data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 999Pi # local-path does not support storage requests so we use a big number just to show that it's uncapped
    - metadata:
        name: *wal-archives
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 999Pi # local-path does not support storage requests so we use a big number just to show that it's uncapped
{{- end }}
