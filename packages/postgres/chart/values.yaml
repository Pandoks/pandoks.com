db: example
namespace: example

credentials:
  secret: postgres-example-creds
  dataKeys:
    superuserPassword: SUPERUSER_PASSWORD
    adminPassword: ADMIN_PASSWORD
    clientPassword: CLIENT_PASSWORD
    replicationPassword: REPLICATION_PASSWORD
    patroniPassword: PATRONI_PASSWORD

backup:
  credentials:
    secret: backup-bucket-creds
    dataKeys:
      accessKey: S3_ACCESS_KEY
      secretKey: S3_SECRET_KEY
  bucket: backups
  image: ghcr.io/pandoks/pgbackrest:latest@sha256:875fd9038f6f32777ce3f9f86fc33e0c4ac36c9bf70035db508d9d402456f25a
  encryptionKey: openssl-rand-hex-32
  path: kubernetes/examples/postgres
  schedules:
    full: '0 2 * * 0'
    diff: '0 2 * * 3,6'
    incr: '0 2 * * 1,2,4,5'
  retention:
    full: 4
    diff: 2
  resources: {}

s3:
  region: us-west-1
  host: host.k3d.internal:4566
  tls: 'n'
  uriStyle: path

patroni:
  shards: 1
  replicasPerShard: 3 # NOTE: replicasPerShard = primary (1) + replicas (n - 1)
  image: ghcr.io/pandoks/patroni:latest@sha256:ea705a1d123ccb1fc57b9c4d3993879a23e7bf814e1f0479b5df94900eb56fbb
  parameters:
    # NOTE: dcs parameters only apply when bootstrapping a fresh cluster — change a running
    # cluster with `patronictl edit-config` (these can't be set per-node, only via dcs)
    dcs:
      max_connections: 100
      max_locks_per_transaction: 64
      max_worker_processes: 20
      max_wal_senders: 20
      max_replication_slots: 20
      wal_keep_size: 16384MB
      max_slot_wal_keep_size: 16384MB
      max_wal_size: 4GB
      min_wal_size: 1GB
      wal_compression: 'on'
    # local parameters apply per-node on helm upgrade via rolling restart
    local:
      shared_buffers: 128MB
      effective_cache_size: 4GB
      work_mem: 4MB
      maintenance_work_mem: 64MB
      max_parallel_workers: 8
      max_parallel_workers_per_gather: 2
  resources:
    patroni: {}
    pgbackrest: {}
    postgresExporter: {}

# https://github.com/pgdogdev/helm/blob/main/values.yaml
pgdog:
  replicas: 2
  workers: 2
  defaultPoolSize: 15
  lsnCheckDelay: 0
  lsnCheckInterval: 1000
  loadBalancingStrategy: least_active_connections
  readWriteSplit: include_primary_if_replica_banned
